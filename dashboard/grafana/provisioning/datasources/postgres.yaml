apiVersion: 1

datasources:
  - name: gitai-postgres
    type: postgres
    uid: gitai-postgres
    url: postgres:5432
    database: ${POSTGRES_DB}
    user: grafana_ro
    secureJsonData:
      password: ${GRAFANA_DB_PASSWORD}
    jsonData:
      sslmode: disable
      maxOpenConns: 10
      maxIdleConns: 2
      connMaxLifetime: 14400
      postgresVersion: 1600
      timescaledb: false
    isDefault: true
    editable: false
